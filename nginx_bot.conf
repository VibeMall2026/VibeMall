# nginx_bot.conf — VPS Nginx reverse proxy snippet for the trading bot API.
#
# Include this block inside an existing `server {}` block in your Nginx
# configuration on the Ubuntu VPS (e.g. /etc/nginx/sites-available/your-site).
#
# The SSH reverse tunnel (ssh_tunnel.bat) forwards remote port 2222 to the
# Windows PC's localhost:8001, so Nginx proxies to localhost:2222 here.
#
# After adding this snippet, reload Nginx:
#   sudo nginx -t && sudo systemctl reload nginx

location /bot/ {
    proxy_pass         http://localhost:2222/;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 300s;
}
