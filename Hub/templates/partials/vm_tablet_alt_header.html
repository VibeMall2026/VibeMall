{% load static %}
<header class="vm-tablet-alt-header" aria-label="Tablet header">
    <div class="vm-tablet-alt-header__inner">
        <div class="vm-tablet-alt-header__left">
            <button type="button" class="offcanvas-toggle-btn" aria-label="Open menu"><i class="fas fa-bars"></i></button>
            <a href="{% url 'index' %}" class="vm-tablet-alt-header__brand">VibeMall</a>
        </div>

        <form class="vm-tablet-alt-search" data-vm-tablet-search-form action="{% url 'shop' %}" method="get" role="search" aria-label="Search products">
            <i class="far fa-search" aria-hidden="true"></i>
            <input
                type="search"
                name="q"
                value="{{ selected_q|default:'' }}"
                placeholder="Search curated collections..."
                autocomplete="off"
                data-search-url="{% url 'product_search_api' %}"
                data-placeholder-image="{% static 'assets/img/product/tp-1.jpg' %}">
            <div class="vm-tablet-alt-search__results" data-vm-tablet-search-results aria-live="polite"></div>
        </form>

        <div class="vm-tablet-alt-header__actions">
            <a href="{% url 'wishlist' %}" aria-label="Wishlist"><i class="far fa-heart"></i></a>
            <button type="button" class="has-badge vm-mini-cart-trigger vm-tablet-cart-trigger" aria-label="Open cart" aria-controls="vmMiniCartDrawer" aria-expanded="false">
                <i class="far fa-shopping-bag"></i>
                <span class="vm-mini-cart-badge cart-count">{{ cart_count|default:"0" }}</span>
            </button>
            {% if request.user.is_authenticated %}
            <a href="{% url 'profile' %}" aria-label="Account"><i class="far fa-user"></i></a>
            <a href="{% url 'logout' %}" aria-label="Logout"><i class="fas fa-sign-out-alt"></i></a>
            {% else %}
            <a href="{% url 'login' %}" aria-label="Account"><i class="far fa-user"></i></a>
            {% endif %}
        </div>
    </div>
</header>
