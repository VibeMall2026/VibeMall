<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ITR Reports</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
<div class="container">
  <h3>ITR Financial Reports</h3>
  <p class="text-muted">Generated files are automatically stored in SpecialBackup monthly folders.</p>
  <form method="post" class="card card-body">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Report Type</label>
        <select class="form-select" name="report_type" id="report_type">
          <option value="monthly">Monthly</option>
          <option value="six_month">6-Month</option>
          <option value="yearly">Yearly</option>
          <option value="custom">Custom Date Range</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">From Date (custom)</label>
        <input type="date" name="date_from" class="form-control">
      </div>
      <div class="col-md-4">
        <label class="form-label">To Date (custom)</label>
        <input type="date" name="date_to" class="form-control">
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-success" type="submit">Generate & Download Report</button>
      <a class="btn btn-outline-secondary" href="{% url 'admin_backup_dashboard' %}">Back</a>
    </div>
  </form>
</div>
</body>
</html>
