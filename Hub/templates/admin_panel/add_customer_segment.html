{% extends 'admin_panel/base_admin.html' %}

{% block title %}Add Customer Segment{% endblock %}

{% block content %}
<div class="container-xxl flex-grow-1 container-p-y">
    <h4 class="fw-bold py-3 mb-4">Add Customer Segment</h4>
    <div class="card">
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6">
                        <label class="form-label">Name</label>
                        <input type="text" name="name" class="form-control" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Segment Type</label>
                        <select name="segment_type" class="form-select" required>
                            {% for value, label in segment_types %}
                            <option value="{{ value }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-12">
                        <label class="form-label">Description</label>
                        <textarea name="description" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Min Orders</label>
                        <input type="number" name="min_orders" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Max Orders</label>
                        <input type="number" name="max_orders" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Min Total Spent</label>
                        <input type="number" step="0.01" name="min_total_spent" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Max Total Spent</label>
                        <input type="number" step="0.01" name="max_total_spent" class="form-control">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label">Discount %</label>
                        <input type="number" step="0.01" name="discount_percentage" class="form-control" value="0">
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="free_shipping" id="free_shipping">
                            <label class="form-check-label" for="free_shipping">Free shipping</label>
                        </div>
                    </div>
                    <div class="col-md-3 d-flex align-items-end">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="priority_support" id="priority_support">
                            <label class="form-check-label" for="priority_support">Priority support</label>
                        </div>
                    </div>
                </div>
                <div class="mt-4">
                    <button type="submit" class="btn btn-primary">Create Segment</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
