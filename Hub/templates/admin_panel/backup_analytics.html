<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Backup Analytics</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
<div class="container">
  <h3>Backup Analytics ({{ days }} days)</h3>
  <a class="btn btn-outline-secondary btn-sm mb-3" href="{% url 'admin_backup_dashboard' %}">Back</a>
  <div class="row g-3">
    <div class="col-md-4"><div class="card card-body"><strong>Total:</strong> {{ total_backups }}</div></div>
    <div class="col-md-4"><div class="card card-body"><strong>Success:</strong> {{ successful_backups }}</div></div>
    <div class="col-md-4"><div class="card card-body"><strong>Rate:</strong> {{ success_rate|floatformat:2 }}%</div></div>
  </div>
  <pre class="mt-3 bg-light p-2" style="max-height:280px;overflow:auto">{{ daily_data_json }}</pre>
</div>
</body>
</html>
