{% load static %}
<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Backup Configuration</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
<div class="container">
  <h3>Backup Configuration</h3>
  <form method="post" class="card card-body mt-3">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-3">
        <label class="form-label">Frequency</label>
        <select name="backup_frequency" class="form-select">
          {% for value,label in frequency_choices %}
          <option value="{{ value }}" {% if config.backup_frequency == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Time</label>
        <input type="time" name="schedule_time" value="{{ config.schedule_time|time:'H:i' }}" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">Weekday</label>
        <select name="schedule_weekday" class="form-select">
          {% for value,label in weekdays %}
          <option value="{{ value }}" {% if config.schedule_weekday == value %}selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="col-md-3">
        <label class="form-label">Custom Dates</label>
        <input name="custom_dates" value="{{ config.custom_dates }}" class="form-control" placeholder="1,7,15,30">
      </div>
      <div class="col-md-6">
        <label class="form-label">Backup Root Path</label>
        <input name="backup_root_path" value="{{ config.backup_root_path }}" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">Regular Folder</label>
        <input name="regular_folder_name" value="{{ config.regular_folder_name }}" class="form-control">
      </div>
      <div class="col-md-3">
        <label class="form-label">Special Folder</label>
        <input name="special_folder_name" value="{{ config.special_folder_name }}" class="form-control">
      </div>
      <div class="col-md-8">
        <label class="form-label">Notification Emails</label>
        <input name="notification_emails" value="{{ config.notification_emails }}" class="form-control" placeholder="a@x.com,b@y.com">
      </div>
      <div class="col-md-4 d-flex align-items-end">
        <div class="form-check me-3"><input class="form-check-input" type="checkbox" name="send_success_email" {% if config.send_success_email %}checked{% endif %}><label class="form-check-label">Success Email</label></div>
        <div class="form-check me-3"><input class="form-check-input" type="checkbox" name="send_failure_email" {% if config.send_failure_email %}checked{% endif %}><label class="form-check-label">Failure Email</label></div>
        <div class="form-check"><input class="form-check-input" type="checkbox" name="is_active" {% if config.is_active %}checked{% endif %}><label class="form-check-label">Active</label></div>
      </div>
    </div>
    <div class="mt-3">
      <button class="btn btn-primary" type="submit">Save</button>
      <a class="btn btn-outline-secondary" href="{% url 'admin_backup_dashboard' %}">Back</a>
    </div>
  </form>
</div>
</body>
</html>
