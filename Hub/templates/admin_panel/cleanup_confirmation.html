<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Cleanup Confirmation</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css">
</head>
<body class="p-4">
<div class="container">
  <h3>Confirm Old Backup Cleanup</h3>
  <div class="alert alert-warning">
    <p><strong>Folder:</strong> {{ cleanup.folder_path }}</p>
    <p><strong>Month:</strong> {{ cleanup.folder_label }}</p>
    <p><strong>Status:</strong> {{ cleanup.status }}</p>
  </div>
  <form method="post" class="d-flex gap-2">
    {% csrf_token %}
    <button class="btn btn-danger" name="action" value="confirm" type="submit">Yes, Delete Old Folder</button>
    <button class="btn btn-secondary" name="action" value="decline" type="submit">No, Keep Data</button>
  </form>
</div>
</body>
</html>
