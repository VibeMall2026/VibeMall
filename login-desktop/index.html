<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeMall Login Desktop</title>
  <style>
    body { margin: 0; font-family: Georgia, serif; background: #fbf9f4; color: #1b1c19; }
    .nav { position: sticky; top: 0; background: rgba(251,249,244,.95); border-bottom: 1px solid #ddd; padding: 18px 32px; display:flex; justify-content:space-between; }
    .wrap { max-width: 1200px; margin: 40px auto; display:grid; grid-template-columns: 1fr 1fr; border: 1px solid #ddd; background: #fff; }
    .left { padding: 40px; background: #f0eee9; }
    .right { padding: 40px; }
    label { display:block; font-size:11px; text-transform: uppercase; margin-bottom: 6px; color:#6f5c37; }
    input { width:100%; box-sizing:border-box; padding:10px; margin-bottom:16px; border:1px solid #ccc; }
    .row { display:flex; justify-content:space-between; align-items:center; }
    .btn { width:100%; padding:12px; border:0; background:#171818; color:#fff; cursor:pointer; }
    .error { color:#b00020; font-size:13px; min-height: 18px; }
    .footer { padding: 16px 32px; background: #f0eee9; border-top:1px solid #ddd; }
    @media (max-width: 900px) { .wrap { grid-template-columns: 1fr; margin: 20px; } }
  </style>
</head>
<body>
  <header class="nav"><strong>VIBEMALL</strong><span>Desktop View</span></header>

  <section class="wrap">
    <aside class="left">
      <h2>Digital Atelier</h2>
      <p>Access your curated fashion dashboard and real-time account updates.</p>
    </aside>

    <main class="right">
      <h2>Sign In</h2>
      <form id="loginForm">
        <label for="email">Email Address</label>
        <input id="email" name="username" type="email" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" required>

        <div class="row">
          <label><input id="remember" type="checkbox" style="width:auto;margin-right:6px;">Remember me</label>
          <button id="toggle" type="button" style="padding:8px 10px;">Show</button>
        </div>

        <p id="error" class="error"></p>
        <button id="submitBtn" class="btn" type="submit">Sign In</button>
      </form>
    </main>
  </section>

  <footer class="footer">Copyright 2026 VibeMall</footer>

  <script>
    function getCookie(name) {
      const value = '; ' + document.cookie;
      const parts = value.split('; ' + name + '=');
      return parts.length === 2 ? parts.pop().split(';').shift() : '';
    }

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorEl = document.getElementById('error');
    const pass = document.getElementById('password');
    const toggle = document.getElementById('toggle');

    toggle.addEventListener('click', function () {
      const visible = pass.type === 'text';
      pass.type = visible ? 'password' : 'text';
      toggle.textContent = visible ? 'Show' : 'Hide';
    });

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing In...';
      errorEl.textContent = '';

      const csrf = getCookie('csrftoken');
      const payload = new URLSearchParams();
      payload.set('username', document.getElementById('email').value.trim());
      payload.set('password', pass.value);
      if (document.getElementById('remember').checked) payload.set('remember_me', 'on');
      if (csrf) payload.set('csrfmiddlewaretoken', csrf);

      try {
        const res = await fetch('/login/', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': csrf
          },
          body: payload.toString()
        });

        if (res.redirected && res.url) {
          window.location.href = res.url;
          return;
        }

        if (!res.ok) throw new Error('Unable to sign in right now.');
        errorEl.textContent = 'Invalid email or password.';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
