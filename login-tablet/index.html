<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VibeMall Login Tablet</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #fbf9f4; color: #171818; }
    .nav, .footer { display: flex; justify-content: space-between; align-items: center; padding: 16px 24px; }
    .nav { position: sticky; top: 0; background: rgba(251,249,244,.95); border-bottom: 1px solid #ddd; }
    .card { max-width: 520px; margin: 40px auto; background: #fff; border: 1px solid #ddd; padding: 28px; }
    .label { font-size: 11px; text-transform: uppercase; margin-bottom: 6px; display: block; color: #6f5c37; }
    input { width: 100%; box-sizing: border-box; padding: 10px; margin-bottom: 16px; border: 1px solid #ccc; }
    .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    button { border: 0; background: #171818; color: #fff; padding: 12px 16px; cursor: pointer; width: 100%; }
    .error { color: #b00020; font-size: 13px; min-height: 18px; }
    .footer { margin-top: 30px; background: #f0eee9; font-size: 12px; }
  </style>
</head>
<body>
  <header class="nav">
    <strong>VIBEMALL</strong>
    <span>Tablet View</span>
  </header>

  <main class="card">
    <h2>Welcome Back</h2>
    <form id="loginForm">
      <label class="label" for="email">Email Address</label>
      <input id="email" name="username" type="email" required>

      <label class="label" for="password">Password</label>
      <input id="password" name="password" type="password" required>

      <div class="row">
        <label><input id="remember" type="checkbox" style="width:auto;margin:0 6px 0 0;">Remember me</label>
        <button type="button" id="togglePass" style="width:auto;padding:8px 10px;">Show</button>
      </div>

      <p class="error" id="error"></p>
      <button id="submitBtn" type="submit">Sign In</button>
    </form>
  </main>

  <footer class="footer">
    <span>Copyright 2026 VibeMall</span>
    <span>Privacy | Terms</span>
  </footer>

  <script>
    function getCookie(name) {
      const value = '; ' + document.cookie;
      const parts = value.split('; ' + name + '=');
      return parts.length === 2 ? parts.pop().split(';').shift() : '';
    }

    const form = document.getElementById('loginForm');
    const submitBtn = document.getElementById('submitBtn');
    const errorEl = document.getElementById('error');
    const passInput = document.getElementById('password');
    const togglePass = document.getElementById('togglePass');

    togglePass.addEventListener('click', function () {
      const showing = passInput.type === 'text';
      passInput.type = showing ? 'password' : 'text';
      togglePass.textContent = showing ? 'Show' : 'Hide';
    });

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      errorEl.textContent = '';
      submitBtn.disabled = true;
      submitBtn.textContent = 'Signing In...';

      const csrf = getCookie('csrftoken');
      const payload = new URLSearchParams();
      payload.set('username', document.getElementById('email').value.trim());
      payload.set('password', passInput.value);
      if (document.getElementById('remember').checked) payload.set('remember_me', 'on');
      if (csrf) payload.set('csrfmiddlewaretoken', csrf);

      try {
        const res = await fetch('/login/', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
            'X-Requested-With': 'XMLHttpRequest',
            'X-CSRFToken': csrf
          },
          body: payload.toString()
        });

        if (res.redirected && res.url) {
          window.location.href = res.url;
          return;
        }

        if (!res.ok) throw new Error('Unable to sign in right now.');
        errorEl.textContent = 'Invalid email or password.';
      } catch (err) {
        errorEl.textContent = err.message || 'Login failed.';
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
