name: Django CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      SECRET_KEY: ci-secret-key-change-me-before-production
      DEBUG: "False"
      ALLOWED_HOSTS: localhost,127.0.0.1
      CSRF_TRUSTED_ORIGINS: https://localhost
      SECURE_SSL_REDIRECT: "False"
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_HSTS_SECONDS: "0"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install Dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          test -f requirements.txt
          pip install -r requirements.txt
          if [ -f requirements-test.txt ]; then
            pip install -r requirements-test.txt
          fi

      - name: Validate Django Setup
        run: |
          set -euo pipefail
          python -c "import django; print(django.get_version())"
          test -f manage.py
          python manage.py check --settings=VibeMall.settings

      - name: Validate Migrations
        run: |
          set -euo pipefail
          python manage.py makemigrations --check --dry-run --verbosity=2 || {
            echo "Migration check reported differences."
            python manage.py showmigrations || true
          }
        continue-on-error: true

      - name: Security Checks
        run: |
          set -euo pipefail
          python manage.py check --deploy --verbosity=2 || {
            echo "Deploy checks reported issues."
            python manage.py check --verbosity=2 || true
          }
        continue-on-error: true

      - name: Run Tests
        run: |
          set -euo pipefail
          python manage.py test --verbosity=2 --keepdb || {
            echo "Full test suite reported failures."
            python manage.py test Hub.test_models --verbosity=1 || true
          }
        continue-on-error: true

      - name: Test Summary
        run: |
          echo "Test job finished."

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to Production VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 15m
          debug: true
          script: |
            set -euo pipefail

            PROJECT_DIR="/var/www/vibemall"
            DEPLOY_BRANCH="main"
            VENV_PATH="venv/bin/activate"
            SERVICE_NAME="vibemall"
            NGINX_SERVICE="nginx"
            TIMESTAMP="$(date +%Y%m%d_%H%M%S)"
            STASH_NAME="pre-deploy-${TIMESTAMP}"

            echo "Starting deployment to VPS..."
            echo "Deployment started at: $(date)"
            echo "Server: $(hostname)"
            echo "User: $(whoami)"

            if [ ! -d "$PROJECT_DIR" ]; then
              echo "Project directory not found: $PROJECT_DIR"
              exit 1
            fi

            cd "$PROJECT_DIR"
            echo "Project directory: $(pwd)"

            echo "Current git status:"
            git status --short || true
            git log --oneline -5 || true

            echo "Fetching latest changes from origin/${DEPLOY_BRANCH}..."
            git fetch origin "$DEPLOY_BRANCH"

            if [ -n "$(git status --porcelain)" ]; then
              echo "Local repository changes detected on the server."
              echo "Stashing tracked and untracked changes as ${STASH_NAME}."
              git stash push --include-untracked --message "$STASH_NAME" >/dev/null
            fi

            echo "Pulling latest code..."
            git pull --ff-only origin "$DEPLOY_BRANCH"

            if [ ! -f "$VENV_PATH" ]; then
              echo "Virtual environment not found at $VENV_PATH"
              exit 1
            fi

            echo "Activating virtual environment..."
            source "$VENV_PATH"
            python --version
            pip --version

            export STATIC_ROOT="${STATIC_ROOT:-/var/www/vibemall_shared/staticfiles}"
            export MEDIA_ROOT="${MEDIA_ROOT:-/var/www/vibemall_shared/media}"
            mkdir -p "$STATIC_ROOT" "$MEDIA_ROOT"

            echo "Installing dependencies..."
            python -m pip install --upgrade pip
            python -m pip install -r requirements.txt

            echo "Checking for missing committed migrations..."
            if ! python manage.py makemigrations --check --dry-run --noinput; then
              echo "Deployment stopped: model changes exist without committed migrations."
              echo "Create and commit migrations locally, then deploy again."
              exit 1
            fi

            echo "Applying migrations..."
            python manage.py migrate --noinput

            echo "Collecting static files..."
            python manage.py collectstatic --noinput

            echo "Running Django checks..."
            python manage.py check || {
              echo "Django check reported issues."
            }

            echo "Restarting application services..."
            sudo systemctl restart "$SERVICE_NAME"
            sleep 5

            echo "Reloading nginx..."
            sudo systemctl reload "$NGINX_SERVICE"

            echo "Checking service status..."
            sudo systemctl is-active "$SERVICE_NAME" >/dev/null || {
              echo "Application service failed to start: $SERVICE_NAME"
              sudo systemctl status "$SERVICE_NAME" --no-pager || true
              exit 1
            }

            sudo systemctl is-active "$NGINX_SERVICE" >/dev/null || {
              echo "Nginx service is not running: $NGINX_SERVICE"
              sudo systemctl status "$NGINX_SERVICE" --no-pager || true
              exit 1
            }

            echo "Deployment completed successfully."
            echo "Deployment finished at: $(date)"

      - name: Deployment Summary
        if: always()
        run: |
          echo "Deployment job finished with status: ${{ job.status }}"
