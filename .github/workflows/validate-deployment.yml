name: Validate Deployment Setup

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  validate-secrets:
    name: Validate GitHub Secrets
    runs-on: ubuntu-latest

    steps:
      - name: Check Required Secrets
        run: |
          echo "Validating GitHub Secrets configuration..."

          if [ -z "${{ secrets.VPS_HOST }}" ]; then
            echo "VPS_HOST secret is not set"
            exit 1
          else
            echo "VPS_HOST secret is configured"
          fi

          if [ -z "${{ secrets.VPS_USERNAME }}" ]; then
            echo "VPS_USERNAME secret is not set"
            exit 1
          else
            echo "VPS_USERNAME secret is configured"
          fi

          if [ -z "${{ secrets.VPS_SSH_KEY }}" ]; then
            echo "VPS_SSH_KEY secret is not set"
            exit 1
          else
            echo "VPS_SSH_KEY secret is configured"
          fi

          if [ -z "${{ secrets.VPS_PORT }}" ]; then
            echo "VPS_PORT secret is not set, defaulting to port 22"
          else
            echo "VPS_PORT secret is configured"
          fi

          echo "Secret validation completed."

  test-connection:
    name: Test VPS Connection
    runs-on: ubuntu-latest
    needs: validate-secrets

    steps:
      - name: Test VPS Connectivity
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 60s
          debug: true
          script: |
            echo "VPS connection test successful."
            echo "Test performed at: $(date)"
            echo "Server: $(hostname)"
            echo "User: $(whoami)"
            echo "Current directory: $(pwd)"

            if [ -d "/var/www/vibemall" ]; then
              echo "Project directory exists"
              cd /var/www/vibemall
              git_safe() {
                git -c safe.directory=/var/www/vibemall "$@"
              }
              echo "Git status:"
              git_safe status --porcelain || echo "Git repository not available"
            else
              echo "Project directory /var/www/vibemall not found"
            fi

            if [ -f "/var/www/vibemall/venv/bin/activate" ]; then
              echo "Virtual environment exists"
            else
              echo "Virtual environment not found"
            fi

            echo "Checking services..."
            sudo systemctl is-active vibemall || echo "VibeMall service not active"
            sudo systemctl is-active nginx || echo "Nginx service not active"

            echo "Connection test completed."
