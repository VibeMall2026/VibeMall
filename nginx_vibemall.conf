upstream vibemall_app {
    server unix:/run/vibemall.sock fail_timeout=0;
}

server {
    listen 80;
    listen [::]:80;
    server_name vibemall.in www.vibemall.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vibemall.in www.vibemall.in;

    ssl_certificate /etc/letsencrypt/live/vibemall.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vibemall.in/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location /static/ {
        alias /var/www/vibemall/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /var/www/vibemall/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://vibemall_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
